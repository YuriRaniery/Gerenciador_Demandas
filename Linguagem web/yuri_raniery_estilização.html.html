<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>FORMULARIO DE CADASTRO</title>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; background-color: white; padding: 20px;"></body>

    <h1 style="text-align: center; color: black;"></h1> FORMULARIO DE CADASTRO</h1>
    
    <form action="/enviar" method="post" style="max-width: 400px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);"></form> </form>

        <label style="display: block; font-weight: bold; margin-bottom: 5px;"></label> NOME</label>
        <input type="text" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;"> </input>
    
        <label style="display: block; font-weight: bold; margin-bottom: 5px;">CPF</label>
        <input type="text" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <label style="display: block; font-weight: bold; margin-bottom: 5px;">ENDEREÇO</label>
        <input type="text" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <label style="display: block; font-weight: bold; margin-bottom: 5px;">FILIAÇÃO</label>
        <input type="text" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <label style="display: block; font-weight: bold; margin-bottom: 5px;">FOTO DO CLIENTE</label>
        <input type="file" style="width: 100%; margin-bottom: 15px;">

        <label style="display: block; font-weight: bold; margin-bottom: 5px;">E-MAIL</label>
        <input type="email" style="width: 100%; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">

        <button type="submit" style="width: 100%; background-color: #007bff; color: white; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
            CADASTRAR
        </button>
    </form>

</body>
</html>
