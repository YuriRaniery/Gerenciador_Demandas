<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peneira de Futebol - Inscrições Abertas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="hero">
        <div class="overlay">
            <div class="container">
                <h1>Torne-se o próximo craque!</h1>
                <p>Mostre o seu talento para olheiros profissionais. As inscrições para a próxima seletiva terminam em breve.</p>
                
                <form id="lpForm">
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                    <input type="email" id="email" placeholder="Teu melhor e-mail" required>
                    <button type="submit" class="btn-submit">QUERO MINHA VAGA</button>
                </form>
                <div id="message"></div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
